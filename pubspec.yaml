name: todo_list
description: "App that makes everydays diuties easier du to the fact planning"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0

  # Google / Apple Sign-In
  google_sign_in: ^6.1.5

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # File storage
  path_provider: ^2.0.15

  # Utilities
  uuid: ^4.2.1
  #Qr to groups
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
